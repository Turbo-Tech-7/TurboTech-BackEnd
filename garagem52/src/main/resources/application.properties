# =============================================
# BANCO DE DADOS MySQL local
# =============================================
# ORM: o Hibernate usa estas configs para abrir conexao com o MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/garagem52_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=seu_user
spring.datasource.password=sua_senha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE (ORM)
# =============================================
# ddl-auto=update: Hibernate cria/atualiza tabelas com base nas @Entity automaticamente
# Em producao use 'validate' ou 'none' + Flyway/Liquibase para migrations controladas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# =============================================
# JWT JSON Web Token
# =============================================
# secret: chave para assinar os tokens (minimo 256 bits para HS256)
# expiration: validade em milissegundos (86400000 = 24 horas)
jwt.secret=garagem52-chave-secreta-super-segura-para-assinar-tokens-jwt-2024
jwt.expiration=86400000

# =============================================
# SERVIDOR
# =============================================
server.port=8080
spring.application.name=garagem52

logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR

api.token=token_api

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=seu_user@smtp-brevo.com
spring.mail.password=sua_senha
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true